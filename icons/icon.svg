<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71"/>
      <stop offset="100%" style="stop-color:#27ae60"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="102" fill="url(#bgGrad)"/>
  
  <!-- Fork-leaf icon -->
  <g transform="translate(156, 100)">
    <!-- Fork handle -->
    <rect x="88" y="140" width="24" height="120" rx="12" fill="url(#iconGrad)"/>
    
    <!-- Fork tines as leaves -->
    <ellipse cx="60" cy="112" rx="16" ry="48" fill="url(#iconGrad)" transform="rotate(-15, 60, 112)"/>
    <ellipse cx="100" cy="100" rx="16" ry="56" fill="url(#iconGrad)"/>
    <ellipse cx="140" cy="112" rx="16" ry="48" fill="url(#iconGrad)" transform="rotate(15, 140, 112)"/>
  </g>
</svg>
